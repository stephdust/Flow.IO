# Home Assistant helper entities for Flow.IO alarms.
#
# This file is meant to be included from Home Assistant configuration.yaml:
#
# template: !include docs/integration/home_assistant_alarm_helpers_fio53.yaml
#
# Current firmware behavior for Flow.IO:
# - Flow.IO auto-discovers `sensor.fio53_alm_pack` for alarm state packing.
# - Flow.IO auto-discovers one global `button.*` ack entity using
#   the MQTT command path `{"cmd":"alarms.ack_all"}`.
# - Flow.IO auto-discovers one `button.*` per slot `0..7` using
#   the MQTT command path `{"cmd":"alarms.ack_slot","args":{"slot":N}}`.
# - The detailed MQTT payload still exists in firmware (`rt/alarms/id<id>`), but the
#   current HA discovery layer does not expose one state entity per alarm.
#
# This helper file decodes `sensor.fio53_alm_pack`, which is built in
# `AlarmModule::buildPacked_()` with 5 bits per slot:
# - bit 0: active
# - bit 1: acked
# - bit 2: condition == true
# - bits 3..4: severity
#
# Slot mapping for the current FlowIO profile, based on module init order:
# - slot 0 -> AlarmId 1000 -> psi_low
# - slot 1 -> AlarmId 1001 -> psi_high
# - slot 2 -> AlarmId 1002 -> ph_tank_low
# - slot 3 -> AlarmId 1003 -> chlorine_tank_low
# - slot 4 -> AlarmId 1004 -> ph_pump_max_uptime
# - slot 5 -> AlarmId 1005 -> chlorine_pump_max_uptime
#
# `PoolPhPumpMaxUptime` and `PoolChlorinePumpMaxUptime` are latched alarms.
# Their matching HA ack buttons are:
# - slot 4 -> button.fio53_alm_ack_slot_4
# - slot 5 -> button.fio53_alm_ack_slot_5
#
# If alarm registration order changes in firmware, this mapping must be updated.

- binary_sensor:
      - name: fio53_psi_low_active
        unique_id: fio53_psi_low_active
        icon: mdi:alarm-light
        availability: >
          {{ states('sensor.fio53_alm_pack') not in ['unknown', 'unavailable', 'none'] }}
        state: >
          {% set pack = states('sensor.fio53_alm_pack') | int(0) %}
          {{ ((pack // 1) % 2) == 1 }}

      - name: fio53_psi_low_acked
        unique_id: fio53_psi_low_acked
        icon: mdi:check-circle-outline
        availability: >
          {{ states('sensor.fio53_alm_pack') not in ['unknown', 'unavailable', 'none'] }}
        state: >
          {% set pack = states('sensor.fio53_alm_pack') | int(0) %}
          {{ ((pack // 2) % 2) == 1 }}

      - name: fio53_psi_low_condition
        unique_id: fio53_psi_low_condition
        icon: mdi:flash-alert
        availability: >
          {{ states('sensor.fio53_alm_pack') not in ['unknown', 'unavailable', 'none'] }}
        state: >
