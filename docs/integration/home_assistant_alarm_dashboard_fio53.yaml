# Example Lovelace stack for Flow.io alarms.
#
# Paste this card into a dashboard view. It is not a full dashboard export.
# It assumes:
# - the helper entities from `home_assistant_alarm_helpers_fio53.yaml` are installed
# - custom cards `bubble-card`, `mushroom`, and `service-call` are available
# - the MQTT topic below is updated to match your device:
#   `flowio/ESP32-670D34/cmd`
#
# Reset behavior:
# - use `{"cmd":"alarms.reset_slot","args":{"slot":N}}`
# - reset is only meaningful for latched alarms
# - the button is disabled when the alarm is not active or when condition is still true

type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: "#alerts"
    button_type: name
    sub_button:
      main: []
      bottom: []
    show_header: true
    name: Alarms
    icon: m3o:warning

  - type: custom:mushroom-template-card
    entity: binary_sensor.fio53_psi_low_active
    primary: Low pressure
    secondary: >-
      {% if is_state('binary_sensor.fio53_psi_low_active', 'off') %}
        Off
      {% elif is_state('binary_sensor.fio53_psi_low_condition', 'off') %}
        Triggered (inactive)
      {% else %}
        Triggered (active)
      {% endif %} ({{
      relative_time(states["binary_sensor.fio53_psi_low_active"].last_changed)
      }})
    icon: mdi:gauge-empty
    icon_tap_action:
      action: none
    hold_action:
      action: none
    color: |
      {% if is_state('binary_sensor.fio53_psi_low_active', 'off') %}
        green
      {% elif is_state('binary_sensor.fio53_psi_low_condition', 'off') %}
        orange
      {% else %}
        red
      {% endif %}
    features_position: inline
    multiline_secondary: false
    features:
      - type: custom:service-call
        entries:
          - type: button
            icon: mdi:restart-alert
            entity_id: binary_sensor.fio53_psi_low_active
            value_attribute: state
            haptics: true
            autofill_entity_id: false
            tap_action:
              action: call-service
              service: mqtt.publish
              data:
                topic: flowio/ESP32-670D34/cmd
                payload: "{\"cmd\":\"alarms.reset_slot\",\"args\":{\"slot\":0}}"
                qos: 0
                retain: false
            hold_action:
              action: none
            styles: |-
              :host {
                {% if is_state('binary_sensor.fio53_psi_low_active', 'off') or is_state('binary_sensor.fio53_psi_low_condition', 'on') %}
                --icon-color: var(--disabled-color);
                opacity: 0.45;
                pointer-events: none;
                {% endif %}
              }

