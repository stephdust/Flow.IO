title: Flow.IO Alarms
views:
  - title: Alarmes
    path: flowio-alarmes
    icon: mdi:alarm-light
    cards:
      - type: markdown
        content: |
          # Flow.IO alarms
          Une ligne par alarme, avec 3 indicateurs a droite: `active`, `ack`, `condition`.

      - type: grid
        columns: 1
        square: false
        cards:
          - type: button
            entity: button.fio53_alm_ack_all
            name: Ack active alarms
            icon: mdi:alarm-check

      - type: markdown
        content: |
          ## Ack slots (Flow.IO current mapping)
          - slot 0: psi_low
          - slot 1: psi_high
          - slot 2: ph_tank_low
          - slot 3: chlorine_tank_low
          - slot 4: ph_pump_max_uptime
          - slot 5: chlorine_pump_max_uptime

      - type: grid
        columns: 3
        square: false
        cards:
          - type: button
            entity: button.fio53_alm_ack_slot_0
            name: Ack psi_low
            icon: mdi:numeric-0-box-outline
          - type: button
            entity: button.fio53_alm_ack_slot_1
            name: Ack psi_high
            icon: mdi:numeric-1-box-outline
          - type: button
            entity: button.fio53_alm_ack_slot_4
            name: Ack pH max uptime
            icon: mdi:numeric-4-box-outline
          - type: button
            entity: button.fio53_alm_ack_slot_5
            name: Ack chlorine max uptime
            icon: mdi:numeric-5-box-outline

      - type: grid
        columns: 4
        square: false
        cards:
          - type: button
            entity: binary_sensor.fio53_psi_low_active
            name: Low pressure
            icon: mdi:gauge-empty
            show_state: false
            state_color: true
            tap_action:
              action: more-info
            hold_action:
              action: more-info
          - type: button
            entity: binary_sensor.fio53_psi_low_active
            name: Active
            icon: mdi:alarm-light
            show_state: false
            state_color: true
            tap_action:
              action: none
            hold_action:
              action: more-info
          - type: button
            entity: binary_sensor.fio53_psi_low_acked
            name: Ack
            icon: mdi:check-circle-outline
            show_state: false
            state_color: true
            tap_action:
              action: none
            hold_action:
              action: more-info
          - type: button
            entity: binary_sensor.fio53_psi_low_condition
            name: Cond
            icon: mdi:flash-alert
            show_state: false
            state_color: true
            tap_action:
              action: none
            hold_action:
              action: more-info

      - type: grid
        columns: 4
        square: false
        cards:
          - type: button
            entity: binary_sensor.fio53_psi_high_active
            name: High pressure
            icon: mdi:gauge-full
            show_state: false
            state_color: true
            tap_action:
              action: more-info
            hold_action:
              action: more-info
          - type: button
