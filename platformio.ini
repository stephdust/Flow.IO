[platformio]
default_envs = FlowIO

[common]
supervisor_firmware_version = '"1.4.0"'
flowio_firmware_version = '"4.7.1"'
nextion_firmware_version = '"6.0.0"'

[env]
platform = espressif32@6.12.0 ; from https://github.com/platformio/platform-espressif32/releases
board = esp32doit-devkit-v1
framework = arduino
lib_compat_mode = strict
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_ldf_mode = chain
debug_tool = esp-prog
debug_init_break = tbreak setup
upload_protocol = esptool
extra_scripts =
	pre:scripts/generate_datamodel.py
	pre:scripts/generate_config_docs.py

[env:FlowIO]
custom_version = ${common.flowio_firmware_version}
board_build.partitions = partitions_flowio_no_ota.csv
build_flags =
	-std=c++17
	-std=gnu++17
	-D ESP32_DEVKITV1
	-D CORE_DEBUG_LEVEL=0
	-D CONFIG_LOG_COLORS=1
	-D BOARD_REV=1
	; Set to 0 to strip buffer-usage tracking from the binary.
	-D FLOW_ENABLE_BUFFER_USAGE_TRACKING=1
	; -D FLOW_SWAP_LOG_HMI_SERIAL=1
	-D FLOW_PROFILE_FLOWIO=1
	-D FIRMW=${common.flowio_firmware_version}
	-D TFT_FIRMW=${common.nextion_firmware_version}
	-Os
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
build_src_filter =
	+<*>
	-<main_supervisor.cpp>
	-<Modules/Network/WebInterfaceModule/>
	-<Modules/Network/WifiProvisioningModule/>
	-<Modules/Network/FirmwareUpdateModule/>
	-<Modules/SupervisorHMIModule/>
build_unflags =
	-std=gnu++11

lib_deps =
	;Arduino_DebugUtils @ 1.4.0
	;paulstoffregen/Time @ 1.6
	bblanchon/ArduinoJson @ ^6.21.5
	robtillaart/RunningMedian @ 0.3.9
	robtillaart/ADS1X15 @ 0.5.0
	milesburton/DallasTemperature
	;rlogiacco/CircularBuffer@^1.4.0
upload_port = /dev/cu.usbserial-0001

[env:FlowIOWokwi]
extends = env:FlowIO
extra_scripts =
	${env.extra_scripts}
	pre:scripts/generate_wokwi_default_overrides.py
build_src_filter =
	${env:FlowIO.build_src_filter}
build_flags =
	${env:FlowIO.build_flags}
	-D FLOW_WOKWI_DEFAULT_OVERRIDES=1
custom_wokwi_defaults_file = wokwi/default_overrides.json
custom_wokwi_defaults_required = 0

[env:Supervisor]
custom_version = ${common.supervisor_firmware_version}
board_build.filesystem = spiffs
board_build.partitions = partitions_supervisor.csv
build_flags =
	-std=c++17
	-std=gnu++17
	-D JsonHandlerTypes=JsonHandlerMethods
	-D ESP32_DEVKITV1
	-D CORE_DEBUG_LEVEL=0
	-D CONFIG_LOG_COLORS=1
	-D BOARD_REV=1
	; Set to 0 to strip buffer-usage tracking from the binary.
	-D FLOW_ENABLE_BUFFER_USAGE_TRACKING=1
	-D FLOW_PROFILE_SUPERVISOR=1
	-D FIRMW=${common.supervisor_firmware_version}
	-D TFT_FIRMW=${common.nextion_firmware_version}
	-D FLOW_SUPERVISOR_FLOWIO_EN_PIN=25
	-D FLOW_SUPERVISOR_FLOWIO_BOOT_PIN=26
	-D FLOW_SUPERVISOR_NEXTION_RX=33
	-D FLOW_SUPERVISOR_NEXTION_TX=32
	-D FLOW_SUPERVISOR_NEXTION_REBOOT=13
	-D FLOW_SUPERVISOR_NEXTION_UPLOAD_BAUD=115200
	-D FLOW_SUPERVISOR_TFT_RESX=240
	-D FLOW_SUPERVISOR_TFT_RESY=320
	-D FLOW_SUPERVISOR_TFT_ROTATION=1
	-D FLOW_SUPERVISOR_TFT_COLSTART=0
	-D FLOW_SUPERVISOR_TFT_ROWSTART=33
	-D FLOW_SUPERVISOR_TFT_BL=14
	-D FLOW_SUPERVISOR_TFT_CS=15
	-D FLOW_SUPERVISOR_TFT_DC=4
	-D FLOW_SUPERVISOR_TFT_RST=5
	-D FLOW_SUPERVISOR_TFT_MOSI=19
	-D FLOW_SUPERVISOR_TFT_SCLK=18
	-D FLOW_SUPERVISOR_PIR_PIN=36
	-D FLOW_SUPERVISOR_TFT_PIR_TIMEOUT_MS=10000
	-D FLOW_SUPERVISOR_WIFI_RESET_PIN=23
	-D FLOW_SUPERVISOR_WIFI_RESET_HOLD_MS=3000
	-D NEXT_RX=33
	-D NEXT_TX=32
	-Os
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
build_src_filter =
	+<*>
	-<main_flowio.cpp>
	-<Modules/IOModule/>
	-<Modules/HMIModule/>
	-<Modules/PoolLogicModule/>
	-<Modules/PoolDeviceModule/>
	-<Modules/Network/HAModule/>
	-<Modules/Network/MQTTModule/>
build_unflags =
	-std=gnu++11

lib_deps =
	bblanchon/ArduinoJson @ ^6.21.5
	adafruit/Adafruit GFX Library @ ^1.11.10
	adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
	ESP32Async/AsyncTCP @ ^3.3.2
	ESP32Async/ESPAsyncWebServer @ ^3.6.0
upload_port = /dev/cu.usbserial-1420

[env:SupervisorWokwi]
extends = env:Supervisor
custom_wokwi_defaults_file = wokwi/default_overrides.json
custom_wokwi_defaults_required = 0
