[platformio]
default_envs = FlowIO

[common]
supervisor_firmware_version = '"1.0.2"'
flowio_firmware_version = '"1.0.2"'
flow_connect_display_firmware_version = '"0.7.1"'
micronova_firmware_version = '"0.1.0"'
nextion_firmware_version = '"6.0.0"'

[env]
platform = espressif32@6.12.0 ; from https://github.com/platformio/platform-espressif32/releases
board = esp32doit-devkit-v1
framework = arduino
lib_compat_mode = strict
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_ldf_mode = chain
debug_tool = esp-prog
debug_init_break = tbreak setup
upload_protocol = esptool
extra_scripts =
	pre:scripts/generate_build_version.py
	pre:scripts/generate_datamodel.py
	pre:scripts/generate_runtimeui_manifest.py
	pre:scripts/prepare_spiffs_data.py
	post:scripts/export_binaries.py

[env:FlowIO]
custom_version = ${common.flowio_firmware_version}
board_build.partitions = partitions_flowio_no_ota.csv
build_flags =
	-std=c++17
	-std=gnu++17
	-D ESP32_DEVKITV1
	-D CORE_DEBUG_LEVEL=0
	-D CONFIG_LOG_COLORS=1
	-D BOARD_REV=1
	; Set to 0 to strip buffer-usage tracking from the binary.
	-D FLOW_ENABLE_BUFFER_USAGE_TRACKING=1
	; -D FLOW_SWAP_LOG_HMI_SERIAL=1
	-D FLOW_PROFILE_FLOWIO=1
	-D FIRMW=${common.flowio_firmware_version}
	-D TFT_FIRMW=${common.nextion_firmware_version}
	-Os
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
build_src_filter =
	+<*>
	-<Profiles/Supervisor/>
	-<Profiles/FlowConnectDisplay/>
	-<Profiles/Micronova/>
	-<Modules/Micronova/>
	-<Modules/FlowConnectDisplay/>
	-<Modules/Network/I2CCfgClientModule/>
	-<Modules/Network/WebInterfaceModule/>
	-<Modules/Network/WifiProvisioningModule/>
	-<Modules/Network/FirmwareUpdateModule/>
	-<Modules/SupervisorHMIModule/>
build_unflags =
	-std=gnu++11

lib_deps =
	;Arduino_DebugUtils @ 1.4.0
	;paulstoffregen/Time @ 1.6
	bblanchon/ArduinoJson @ ^6.21.5
	robtillaart/RunningMedian @ 0.3.9
	robtillaart/ADS1X15 @ 0.5.0
	milesburton/DallasTemperature
	adafruit/Adafruit Unified Sensor @ ^1.1.15
	adafruit/Adafruit BusIO @ ^1.16.2
	https://github.com/adafruit/Adafruit_SHT4X.git
	https://github.com/adafruit/Adafruit_BMP280_Library.git
	https://github.com/adafruit/Adafruit_BME680.git
	https://github.com/wollewald/INA226_WE.git
	;rlogiacco/CircularBuffer@^1.4.0


[env:FlowIOWokwi]
extends = env:FlowIO
extra_scripts =
	${env.extra_scripts}
	pre:scripts/wokwi_select_profile.py
	pre:scripts/generate_wokwi_default_overrides.py
build_src_filter =
	${env:FlowIO.build_src_filter}
build_flags =
	${env:FlowIO.build_flags}
	-D FLOW_WOKWI_DEFAULT_OVERRIDES=1
custom_wokwi_defaults_file = wokwi/default_overrides.json
custom_wokwi_defaults_required = 0

[env:Supervisor]
custom_version = ${common.supervisor_firmware_version}
board_build.filesystem = spiffs
board_build.partitions = partitions_supervisor.csv
build_flags =
	-std=c++17
	-std=gnu++17
	-D JsonHandlerTypes=JsonHandlerMethods
	-D ESP32_DEVKITV1
	-D CORE_DEBUG_LEVEL=0
	-D CONFIG_LOG_COLORS=1
	-D BOARD_REV=1
	; Set to 0 to strip buffer-usage tracking from the binary.
	-D FLOW_ENABLE_BUFFER_USAGE_TRACKING=1
	-D FLOW_PROFILE_SUPERVISOR=1
	; Set to 1 to enable verbose heap forensics around the webserver HTTP/WebSocket paths
	; and the sysmon HeapWatch / failed-allocation diagnostics.
	-D FLOW_WEB_HEAP_FORENSICS=0
	-D FIRMW=${common.supervisor_firmware_version}
	-D TFT_FIRMW=${common.nextion_firmware_version}
	-Os
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
build_src_filter =
	+<*>
	-<Profiles/FlowIO/>
	-<Profiles/FlowConnectDisplay/>
	-<Profiles/Micronova/>
	-<Modules/Micronova/>
	-<Modules/FlowConnectDisplay/>
	-<Modules/Network/HmiUdpServerModule/>
	-<Modules/Network/I2CCfgServerModule/>
	-<Modules/IOModule/>
	-<Modules/HMIModule/>
	-<Modules/PoolLogicModule/>
	-<Modules/PoolDeviceModule/>
	-<Modules/Network/HAModule/>
	-<Modules/Network/MQTTModule/>
build_unflags =
	-std=gnu++11

lib_deps =
	bblanchon/ArduinoJson @ ^6.21.5
	adafruit/Adafruit GFX Library @ ^1.11.10
	adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
	ESP32Async/AsyncTCP @ ^3.3.2
	ESP32Async/ESPAsyncWebServer @ ^3.6.0

[env:FlowConnectDisplay]
custom_version = ${common.flow_connect_display_firmware_version}
board_build.filesystem = spiffs
board_build.partitions = partitions_flowio_no_ota.csv
build_flags =
	-std=c++17
	-std=gnu++17
	-D ESP32_DEVKITV1
	-D CORE_DEBUG_LEVEL=0
	-D CONFIG_LOG_COLORS=1
	-D BOARD_REV=1
	-D FLOW_ENABLE_BUFFER_USAGE_TRACKING=0
	-D FLOW_PROFILE_FLOW_CONNECT_DISPLAY=1
	-D FIRMW=${common.flow_connect_display_firmware_version}
	-D TFT_FIRMW=${common.nextion_firmware_version}
	-Os
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
build_src_filter =
	+<*>
	-<Profiles/FlowIO/>
	-<Profiles/Supervisor/>
	-<Profiles/Micronova/>
	-<Modules/Micronova/>
	-<Modules/AlarmModule/>
	-<Modules/CommandModule/>
	-<Modules/IOModule/>
	-<Modules/PoolLogicModule/>
	-<Modules/PoolDeviceModule/>
	-<Modules/SupervisorHMIModule/>
	-<Modules/Logs/LogAlarmSinkModule/>
	-<Modules/HMIModule/>
	+<Modules/HMIModule/Drivers/NextionDriver.cpp>
	-<Modules/Network/HAModule/>
	-<Modules/Network/MQTTModule/>
	-<Modules/Network/WebInterfaceModule/>
	-<Modules/Network/FirmwareUpdateModule/>
	-<Modules/Network/I2CCfgClientModule/>
	-<Modules/Network/I2CCfgServerModule/>
	-<Modules/Network/HmiUdpServerModule/>
	-<Modules/Network/TimeModule/>
	-<Modules/System/SystemModule/>
	-<Modules/System/SystemMonitorModule/>
build_unflags =
	-std=gnu++11

lib_deps =
	bblanchon/ArduinoJson @ ^6.21.5

[env:Micronova]
custom_version = ${common.micronova_firmware_version}
board_build.filesystem = spiffs
board_build.partitions = partitions_supervisor.csv
build_flags =
	-std=c++17
	-std=gnu++17
	-D JsonHandlerTypes=JsonHandlerMethods
	-D ESP32_DEVKITV1
	-D CORE_DEBUG_LEVEL=0
	-D CONFIG_LOG_COLORS=1
	-D BOARD_REV=1
	-D FLOW_ENABLE_BUFFER_USAGE_TRACKING=1
	-D FLOW_PROFILE_MICRONOVA=1
	-D FLOW_HA_ONESHOT_DISCOVERY=1
	-D FIRMW=${common.micronova_firmware_version}
	-D TFT_FIRMW=${common.nextion_firmware_version}
	-Os
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
build_src_filter =
	+<*>
	-<Profiles/FlowIO/>
	-<Profiles/Supervisor/>
	-<Profiles/FlowConnectDisplay/>
	-<Modules/FlowConnectDisplay/>
	-<Modules/HMIModule/>
	-<Modules/PoolLogicModule/>
	-<Modules/PoolDeviceModule/>
	-<Modules/SupervisorHMIModule/>
	-<Modules/Logs/LogAlarmSinkModule/>
	-<Modules/Network/I2CCfgClientModule/>
	-<Modules/Network/I2CCfgServerModule/>
	-<Modules/Network/HmiUdpServerModule/>
	-<Modules/Network/FirmwareUpdateModule/>
build_unflags =
	-std=gnu++11

lib_deps =
	bblanchon/ArduinoJson @ ^6.21.5
	robtillaart/RunningMedian @ 0.3.9
	robtillaart/ADS1X15 @ 0.5.0
	milesburton/DallasTemperature
	adafruit/Adafruit Unified Sensor @ ^1.1.15
	adafruit/Adafruit BusIO @ ^1.16.2
	https://github.com/adafruit/Adafruit_SHT4X.git
	https://github.com/adafruit/Adafruit_BMP280_Library.git
	https://github.com/adafruit/Adafruit_BME680.git
	https://github.com/wollewald/INA226_WE.git
	ESP32Async/AsyncTCP @ ^3.3.2
	ESP32Async/ESPAsyncWebServer @ ^3.6.0


[env:SupervisorWokwi]
extends = env:Supervisor
extra_scripts =
	${env.extra_scripts}
	pre:scripts/wokwi_select_profile.py
custom_wokwi_defaults_file = wokwi/default_overrides.json
custom_wokwi_defaults_required = 0
